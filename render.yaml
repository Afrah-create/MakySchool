services:
  - type: web
    name: makyschool-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=@makyschool/api
    startCommand: npm run start --workspace=@makyschool/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://maky-school-web.vercel.app,https://maky-school-dashboard.vercel.app,https://school.makylegacy.com,https://myschool.makylegacy.com,https://*.vercel.app
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: PLATFORM_APP_URL
        value: https://myschool.makylegacy.com
      - key: RUN_MIGRATIONS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: TENANT_JWT_SECRET
        sync: false
      - key: SUPERADMIN_JWT_SECRET
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: SUPERADMIN_NAME
        value: Platform Admin
